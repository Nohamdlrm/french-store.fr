<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-DRIVERS | En cours</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* Texture fibre de carbone légère */
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        .container {
            text-align: center;
            border-left: 5px solid #ff0000;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(5px);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .red { color: #ff0000; }

        p {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 35px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-yt {
            display: inline-block;
            background: #ff0000;
            color: #fff;
            padding: 15px 35px;
            text-decoration: none;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
            border: 2px solid #ff0000;
        }

        .btn-yt:hover {
            background: transparent;
            color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        /* Animation simple de scanline */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NEO<span class="red">-</span>DRIVERS</h1>
        <p>Site en cours de construction</p>
        
        <a href="https://youtube.com/@TiboInShape" class="btn-yt">YOUTUBE</a>
    </div>

</body>
</html>
