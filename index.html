<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Store | Bientôt disponible...</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5865F2; --accent: #00f2ff; --bg: #05060a;
            --text: #ffffff; --dim: #949ba4; --border: rgba(255,255,255,0.1);
        }
        [data-theme="light"] { --bg: #f8fafc; --text: #0f172a; --dim: #64748b; --border: rgba(0,0,0,0.1); }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Quicksand', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: 0.5s; }

        /* --- FOND ANIMÉ --- */
        .bg-glow {
            position: absolute; width: 400px; height: 400px; background: var(--primary);
            filter: blur(120px); border-radius: 50%; opacity: 0.2; z-index: -1;
            animation: move 10s infinite alternate;
        }
        @keyframes move { from { transform: translate(-50%, -50%); } to { transform: translate(50%, 50%); } }

        /* --- CONTENEUR PRINCIPAL --- */
        .coming-soon {
            text-align: center; max-width: 700px; padding: 60px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            border-radius: 40px; backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .badge {
            display: inline-block; padding: 8px 20px; background: rgba(88, 101, 242, 0.2);
            color: var(--primary); border-radius: 50px; font-weight: 700; margin-bottom: 20px;
        }

        h1 { font-size: 3.5rem; font-weight: 700; margin-bottom: 20px; letter-spacing: -2px; }
        h1 span { background: linear-gradient(90deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: var(--dim); font-size: 1.2rem; margin-bottom: 40px; }

        /* --- PROGRESSION --- */
        .loader-container { width: 100%; height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 40px; overflow: hidden; }
        .loader-bar { width: 75%; height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 10px; position: relative; }
        .loader-bar::after { content: '75%'; position: absolute; right: 0; top: -25px; font-weight: 700; font-size: 0.8rem; color: var(--primary); }

        /* --- COUNTDOWN --- */
        .timer { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .timer-box { background: rgba(0,0,0,0.2); padding: 15px 25px; border-radius: 20px; min-width: 100px; }
        .timer-box span { display: block; font-size: 2rem; font-weight: 700; }
        .timer-box label { font-size: 0.8rem; color: var(--dim); text-transform: uppercase; }

        /* --- CONTROLES --- */
        .controls { position: fixed; top: 30px; right: 30px; display: flex; gap: 10px; }
        select { background: var(--border); color: var(--text); border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 700; }

        .btn-discord {
            display: inline-block; padding: 15px 40px; background: var(--primary); color: white;
            text-decoration: none; border-radius: 15px; font-weight: 700; transition: 0.3s;
        }
        .btn-discord:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(88, 101, 242, 0.4); }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="controls">
        <select onchange="translateSite(this.value)">
            <option value="fr">🇫🇷 FR</option>
            <option value="en">🇺🇸 EN</option>
            <option value="br">🏴󠁢󠁲󠁦󠁲󠁿 BR</option>
        </select>
    </div>

    <div class="coming-soon">
        <div class="badge" id="badge">INFRASTRUCTURE V8.0</div>
        <h1 id="title">Oups ! Cette page est en <span>préparation.</span></h1>
        <p id="desc">Nous peaufinons les derniers détails de l'infrastructure NyxX pour vous offrir la meilleure expérience French Store possible.</p>

        <div class="loader-container">
            <div class="loader-bar"></div>
        </div>

        <div class="timer">
            <div class="timer-box"><span>04</span><label>Jours</label></div>
            <div class="timer-box"><span>12</span><label>Heures</label></div>
            <div class="timer-box"><span>45</span><label>Min</label></div>
        </div>

        <a href="#" class="btn-discord" id="btn">REJOINDRE LE DISCORD</a>
    </div>

    <script>
        const texts = {
            fr: {
                title: "Oups ! Cette page est en <span>préparation.</span>",
                desc: "Nous peaufinons les derniers détails de l'infrastructure NyxX pour vous offrir la meilleure expérience French Store possible.",
                btn: "REJOINDRE LE DISCORD",
                badge: "INFRASTRUCTURE V8.0"
            },
            en: {
                title: "Oops! This page is <span>under construction.</span>",
                desc: "We are polishing the final details of the NyxX infrastructure to bring you the best French Store experience.",
                btn: "JOIN DISCORD",
                badge: "INFRASTRUCTURE V8.0"
            },
            br: {
                title: "Hopala ! Ar bajenn-mañ zo o vezañ <span>prientet.</span>",
                desc: "Emaomp o reizhañ an traoù diwezhañ evit lakaat ar French Store da vezañ eus ar gwellañ.",
                btn: "REIT D'AR DISCORD",
                badge: "FRAMM V8.0"
            }
        };

        function translateSite(l) {
            const d = texts[l];
            document.getElementById('title').innerHTML = d.title;
            document.getElementById('desc').innerText = d.desc;
            document.getElementById('btn').innerText = d.btn;
            document.getElementById('badge').innerText = d.badge;
        }
    </script>
</body>
</html>
